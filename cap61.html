<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
    <script>
        //JSON TECNOLOGIA MUY IMPORTANTE NOTACION DE OBJETO JAVA SCRIPT.
        //JSON SE HA VUELTO EL ESTANDAR EN EL INTERCAMBIO DE INFORMACION.
        //PROPIEDADES Y VALORES.
        const json = {
            cadena: "Jhon",
            numero: 35,
            boolean: true,

        }
        console.log(json);
        console.log(JSON);
        console.log(("{}"));
        console.log(("{1,2,3}"));
        console.log(JSON.parse("{}"));
        //console.log(JSON.parse("{1,2,3}"));
        console.log(JSON.parse("10"));
        console.log(JSON.parse("false"));
        console.log(JSON.parse("null"));//Parsea a un objeto valido para JS
        console.log(JSON.stringify({}))
        //STRINGIFY CONVIERTE UN VALOR JS A JSON VALIDO
        console.log(JSON.stringify([1,2,3]))
        console.log(JSON.stringify(false))
        console.log(JSON.stringify({
            cadena: "Jhon",
            numero: 35,
            boolean: true,
        }))
        //CONVIERTE CUALQUIER COSA A UNA CADENA DE TEXTO NOTACION JSON
        console.log(JSON.parse('{"cadena": "Jhon","numero": "35","boolean": "true","objeto":{"facebook":"Leonel Estrada","nulo":null}}'));
    </script>
</body>
</html>
