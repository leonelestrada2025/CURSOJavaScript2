<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call,Apply,Bind</title>
</head>
<body>
    <script>
        console.log(this);
        this.lugar = "Contexto Global";
        function saludar(saludo, aQuien){
            console.log(`${saludo} ${aQuien} Estamos desde el ${this.lugar}`);
        }
        saludar();
        const obj = {
            lugar:"Contexto Objeto"
        }
        saludar.call(obj, "Hola", "Leonel");
        saludar.call(null, "Hola", "Leonel");
        saludar.call(this, "Hola", "Leonel");
        saludar.apply(obj,["Adios","Leonel"]);
        saludar.apply(null,["Adios","Leonel"]);
        saludar.apply(this,["Adios","Leonel"]);
        this.nombre = "Window";
        const persona = {
            nombre:"Jhon",
            saludar: function(){
                console.log(`Hola ${this.nombre}`)
            }
        }
        persona.saludar();
        const otraPersona = {
            saludar: persona.saludar.bind(this)
        }
        otraPersona.saludar();
    </script>
</body>
</html>
