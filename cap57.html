<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxies</title>
</head>
<body>
    <script>
        //Proxies POO Permite crear un objeto basado en un objeto literal como modelo a seguir.
        const persona = {
            nombre: "",
            apellido: "",
            edad: 0
        }
        //Manejador.
        const manejador = {
            set(obj,prop,valor){
            if(Object.keys(obj).indexOf(prop) === -1){
                return console.error(`La propiedad ${prop} instagram no exite en el objeto persona`);         
            }
            if((prop === "nombre" || prop === "apellido") && !(/^[A-Za-zÁáÉéÍíÓóÚúÑñ\s]+$/g.test(valor))){
                return console.error(`La propiedad ${prop} solo acepta letras y espacios en blanco`);
            }
            obj[prop] = valor;
            }
        }
        const leo = new Proxy(persona, manejador);
        leo.nombre = "leonel";
        leo.apellido = "Estrada";
        leo.edad = 22;
        leo.instagram = "leone.lestrada10";
        console.log(leo);
        console.log(persona);
    </script>
</body>
</html>
