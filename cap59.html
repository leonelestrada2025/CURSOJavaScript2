<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>this</title>
</head>
<body>
    <script>
        //this para invocar en poo
        console.log(this); //this hace referencia al window
        console.log(window);
        console.log(this === window);
        this.nombre = "Contexto global";
        console.log(this.nombre);
        function imprimir(){
            console.log(this.nombre);
        }
        imprimir();
        const obj = {
            nombre: "Contexto objeto",
            imprimir: function (){
                console.log(this.nombre);
            }
        }
        obj.imprimir();
        const objDos = {
            nombre: "Contexto objeto 2",
            imprimir
        }
        objDos.imprimir();
        const obj3 = {
            nombre: "Contexto objeto",
            imprimir:() => {
                console.log(this.nombre);
            }
        }
        obj3.imprimir();
        function Persona (nombre){
            const that = this;
            that.nombre = nombre;
            //return console.log(this.nombre); //Clausura envolver una funcion dentro de otra funcion y la estamos retornando
            /*return () => {
                console.log(this.nombre);
            }*/
           //Antes de las array functions.
           return function (){
            console.log(that.nombre);
           }

        }
        let john = new Persona("Jhon");
        john();
        //Cada funcion crea un contexto. scout
        
    </script>
</body>
</html>
