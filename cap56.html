<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generators</title>
</head>
<body>
    <script>
        //Funcion que nos permite trabajar con la interfaz de los iteradores en un entorno iterable
        function* iterable () {
            yield "Hola";
            console.log("Hola consola");
            yield "Hola 2"
            console.log("seguimos con mas instrucciones de nuestro codigo");
            yield "Hola 3"
            yield "Hola 4"
        } //function* esto es un generador.
        let iterador = iterable();
        //console.log(iterador.next());
        //console.log(iterador.next());
        //console.log(iterador.next());
        //console.log(iterador.next());
        //console.log(it{erador.next());
        //console.log(iterador.next());
        //console.log(iterador.next());
        for(let y of iterador){
            console.log(y);
        }
        const arr = [...iterable()];
        console.log(arr)

        function cuadrado (valor) {
            setTimeout(() =>{
                return console.log({valor, resultado: valor*valor})
            },Math.random() * 1000)

            
        }

        function* generador() {
            console.log("Inicia generator");
            yield cuadrado(0);
            yield cuadrado(1);
            yield cuadrado(2);
            yield cuadrado(3);
            yield cuadrado(4);
            yield cuadrado(5);
            console.log("Termina generator");
        }
        let gen = generador();
        for (let y of gen){
            console.log(y);
        }
    </script>
</body>
</html>
