        //Funcion que mete los numeros paraes a un array y los impares a otro array
        const altoBajo = (arr = undefined) => {
            if(arr === undefined) return console.warn("No ingresate los datos a convertir");
            if(!(arr instanceof Array)) return console.warn(`El valor ingresado ${arr} no es un arreglo`);
            if(arr.length === 0) return console.info(`El array ${arr} no puede estar vacio`);
            for (let numero of arr) {
                if(typeof numero !== "number") return console.info(`El valor ${numero} no es un numero solo se deben ingresar numeros`)          
            }
            return console.info({
                pares: arr.filter(numero => numero % 2 === 0),
                impares: arr.filter(numero => numero % 2 === 1),
            })
        }
        altoBajo();
        altoBajo({});
        altoBajo([]);
        altoBajo(["A",1,2]);
        altoBajo([{},2]);
        altoBajo([1,2,3,4,5]);
