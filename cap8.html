<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valores Primitivos</title>
</head>
<body>
    <script>
        let indefinido;
        console.log("Valor de indefinido:", indefinido); // undefined
        let nulo = null;
        console.log("Valor de nulo:", nulo); // null
        let noEsUnNumero = NaN;
        console.log("Valor de noEsUnNumero:", noEsUnNumero); // NaN
    </script>
    
</body>
</html>
