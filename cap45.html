    <script>
        class Pelicula {
            constructor({id,titulo,director,estreno,pais,genero,calificacion}){
                this.director = director,
                this.id = id,
                this.titulo = titulo,
                this.estreno = estreno,
                this.pais = pais,
                this.genero = genero,
                this.calificacion = calificacion
                this.validarIMDB(id);
                this.validarTitulo(titulo);
                this.validarDirector(director);
                this.validarEstreno(estreno);
                this.validarPais(pais);
                //this.validarGenero(genero);
                this.validarCalificacion(calificacion);     
            }   
            /*static get listaGeneros (){
                return ["Action","Adult","Adventure","Animation"]
            }
            static generosAceptados (){
                return console.info(`Los generos aceptados son: ${Pelicula.listaGeneros.join(", ")}`)

            }*/
            validarCadena(propiedad,valor){
                if(!valor) return console.error(`${propiedad} "${valor}" no puede estar vacio`);
                if(typeof valor !== "string") return console.error(`${propiedad} "${valor}" no es una cadena de texto`);
                return true;
            }  
            validarLongitudCadena(propiedad,valor,longitud){
                if(valor.length > longitud){
                    return console.error(`${propiedad} "${valor}" excede el numero de caracteres permitidos (${longitud}).`);
                    
                }
                return true;
            }
            validarNumero(propiedad, valor){
                if(!valor) return console.error(`${propiedad} "${valor}" no puede estar vacio`);
                if(typeof valor !== "number") return console.error(`${propiedad} "${valor}" no es un numero`);
                return true;
            }
            validarArray(propiedad, valor){
                if(!valor) return console.info(`${propiedad} "${valor}" no puede estar vacio`);
                if(!(valor instanceof Array)) return console.error(`${propiedad} "${valor}" no es un array`);
                if(valor.length === 0) return console.error(`${propiedad}"${valor}" no hay datos`);
                for(let cadena of valor){
                    if(typeof cadena !== "string") return console.error(`${propiedad} "${valor}" No es una cadena de texto`)
                }
                return true;
            }
            validarIMDB(id){
               if(this.validarCadena("IMDB id",id)){
                if(!(/^([a-z]){2}([0-9]){7}$/.test(id))){
                    return console.error(`El IMDB id ${id} no es valido, solamnete debe de tener 9 caracteres los dos primeros letras minusculas y lo demas numeros`)
                }
               }
            }
            validarTitulo(titulo){
               if(this.validarCadena("Titulo",titulo))
                this.validarLongitudCadena("Titulo", titulo , 100)
            }
            validarDirector(director){
               if(this.validarCadena("Director",director))
                this.validarLongitudCadena("Director", director, 50)
            }
            validarEstreno(estreno){
                if(this.validarNumero("Estreno",estreno)){
                if(!(/^[(0-9)]{4}$/.test(estreno))){
                    return console.error(`El estreno ${estreno} no es correcto,Solo acepta numero de 4 digitos`)
                }
            }
            }
            validarPais(pais){
                this.validarArray("Pais",pais);  
            }
            /*validarGenero(genero){
                if(this.validarArray("Genero", genero)){
                    for(let generos of genero){
                        console.log(genero, Pelicula.listaGeneros.includes(genero));
                        if(!(genero, Pelicula.listaGeneros.includes(genero))){
                            return console.error(`El genero "${genero.join(", ")}" invalido`)
                            Pelicula.generosAceptados();
                        } 
                    }
                }
            }*/
            validarCalificacion(calificacion){
                if(this.validarNumero("Calificacion",calificacion)) return (calificacion < 0 || calificacion > 10)?console.error("La calificacion tiene que ser entre un rango de 0 y 10") :this.calificacion = calificacion.toFixed(1)         
            }
        fichaTecnica(){
            console.info(`Ficha tecnica:\nDIRECTOR:"${this.director}\nTitulo:"${this.titulo}"\n"Estreno:"${this.estreno}\nPais:"${this.pais}"\nId:"${this.id}"\nCalificacion:"${this.calificacion}"`)
        }
        }

        {

            //genero: ["Adult"],

        }
        ]
        //Pelicula.generosAceptados();   
        //peli.fichaTecnica();
