<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios del DOM practicos Mini sitio web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hamburgers/1.2.1/hamburgers.css">
    <link rel="stylesheet" href="css/cssUno.css">
</head>
<body>
    <header class="header">
        <h1>Ejercicios del DOM</h1>
    </header>
    <button class="panel-btn hamburger hamburger--vortex" type="button">
        <span class="hamburger-box">
            <span class="hamburger-inner"></span>
        </span>
    </button>
    <aside class="panel">
        <nav class="menu">
            <a href="#seccion1">RELOJ</a>
            <a href="#seccion2">EVENTOS DEL TECLADO</a>
            <a href="#seccion3">Seccion 3</a>

            <a href="#seccion5">Seccion 5</a>
        </nav>
    </aside>
    <main>
        <section id="seccion1" class="section">
            <h2>Reloj digital y alarma sonora</h2>
            <div id="reloj"></div>
            <div>
                <button id="activar-reloj">Activar reloj</button>
                <button id="desactivar-reloj">Desactivar reloj</button>
                <button id="activar-alarma">Activar alarma</button>
                <button id="desactivar-alarma">Desactivar alarma</button>
            </div>
        </section>
        <section id="seccion2" class="section">
            <h2>Eventos del teclado</h2>
            <article class="stage">
                <div class="ball"></div>
            </article>


        </section>
        <section id="seccion3" class="section">
            <h2>Seccion 3</h2>
        </section>
        <section id="seccion4" class="section">
            <h2>Seccion 4</h2>
        </section>
        <section id="seccion5" class="section">
            <h2>Seccion 5</h2>
        </section>
