        const promedio = (arr = undefined) =>{
            if(arr === undefined) return console.warn("No ingresate elementos");
            if(!(arr instanceof Array)) return console.warn(`El valor ingresado ${arr} no es un arreglo`);
            if(arr.length === 0 ) return console.info(`El array ${arr} no puede estar vacio`);
            if(arr.length === 1 ) return console.info(`El array ${arr} debe de tener al menos 2 elementos`);
            for (let numero of arr) {
                if(typeof numero !== "number") return console.info(`El valor ${numero} no es un numero solo se deben ingresar numeros`)          
            }
            return console.info(
                arr.reduce((total,num,index,arr ) => {
                    total  += num;
                    if(index === arr.length-1){
                        return `El promedio ${arr.join(" + ")} es igual a ${Math.round(total/arr.length)}`

                    }else{
                        return total;
                    }
            })
            )
            
            
        }
        promedio([1,3,4]);
