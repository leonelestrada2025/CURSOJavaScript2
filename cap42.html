        //fusion 19-20

        const validarPatron = (cadena = "",patron = undefined) =>{
            if(!cadena) return console.warn("No ingresaste una cadena");
            if(typeof cadena !== "string") return console.warn(`El valor ingresado ${cadena} no es un texto`);
            if(patron === undefined) return console.warn("No ingresaste una cadena");
            if(!(patron instanceof RegExp)) return console.warn(`El valor ingresado ${patron} no es una expresion regular`);
            let expReg = patron.test(cadena);
            return (expReg)
            ?console.info(`El correo ingresado ${cadena} es valido`)
            :console.info(`El correo ingresado ${cadena} no es valido`)
        }
        validarPatron();
        validarPatron({});
        validarPatron("Hola mundo");
        validarPatron("Hola mundo","text");
        validarPatron("leonel estrada",/^[A-Za-zÁáÉéÍíÓóÚúÑñ\s]+$/g);
        validarPatron("leonel estrada 19",/^[A-Za-zÁáÉéÍíÓóÚúÑñ\s]+$/g);
        validarPatron("leonel estrada",/^[a-z0-9]+(\.[_a-z0-9]+)*@[a-z0-9-]+(\.[a-z0-9-])*(\.[a-z]{2,15})/i);
        validarPatron("leonelestrada@gmail.com",/^[a-z0-9]+(\.[_a-z0-9]+)*@[a-z0-9-]+(\.[a-z0-9-])*(\.[a-z]{2,15})/i);
        validarPatron("leonelestrada@gmail.com", new RegExp("^[a-z0-9]+(\\.[_a-z0-9]+)*@[a-z0-9-]+(\\.[a-z0-9-])*(\\.[a-z]{2,15})", "i"));
        validarPatron("leonel,estrada@gmail.com", new RegExp("^[a-z0-9]+(\\.[_a-z0-9]+)*@[a-z0-9-]+(\\.[a-z0-9-])*(\\.[a-z]{2,15})", "i"));
