<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps</title>
</head>
<body>
    <script>
        //Tipo de dato maps.
        //Son objetos que sirven como conjunto de valores
        //Objeto primitivo.
        const mapa = new Map();
        mapa.set("nombre","Leonel");
        mapa.set("apellido","Estrada");//agregar elementos a un mapa
        mapa.set("edad",22);
        console.log(mapa);
        console.log(mapa.size); //Cantidad de elementos de un mapa
        console.log(mapa.has("correo")); //Evalua si existe un parametro dentro un mapa.
        console.log(mapa.get("nombre")); //Obtener algun valor.
        mapa.set("nombre","Galilea");// Reescribir un valor.
        console.log(mapa.get("nombre"));
        mapa.delete("apellido"); //Elimina la propiedad apellido
        console.log(mapa);
        mapa.set(19,"Diecsinueve");
        mapa.set(false,"Falso");
        mapa.set({},{})
        for (let [key, value] of mapa){
            console.log(`LLave: ${key}, Valor: ${value}`);
        }//Recorriendo un mapa.
        //Coleccion llave valor donde podemos generar llaves que no sean cadenas de texto
        //Coasas pre establecidas en tu aplicacion.
        const mapa2 = new Map([
            ["nombre","Chula"],
            ["edad",7],
            ["animal","perro"],
            [null,"Nulo"]
        ]);
        console.log(mapa2);
        for(let [keyU, valueU] of mapa2){
            console.log(`Llave: ${keyU}, Valor: ${valueU}`);
        }
        
        const llavesMapa2 = [...mapa2.keys()];
        const valoresMapa2 = [...mapa2.values()]
        console.log(llavesMapa2);
        console.log(valoresMapa2);
        



        
    </script>
</body>
</html>
