        const calculadora = (grados = undefined, unidad = undefined) =>{
        
        if(grados === undefined) return console.warn("No ingresaste grados a convertir");

        if(typeof grados !== "number") return console.warn(`El valor ingresado ${grados} no es un numero`);
        
        if(unidad === undefined) return console.warn("No ingresaste el tipo de grado a convertir"); 
        
        if(typeof unidad !== "string") return console.warn(`El valor ingresado ${unidad} no es una cadena de texto`);

        if(unidad.length !== 1 || !/(C||F)/.test(unidad)) return console.warn("Valor invalido");

        if(unidad === "C"){
            return console.info(`${grados}°C = ${Math.round((grados * (9/5)) + 32)}°F`);
        }else if(unidad === "F"){
            return console.info(`${grados}°F = ${Math.round((grados - 32) * (5/9))}°C`);
        } 
        }
        calculadora();
        calculadora("2");
        calculadora(2);
