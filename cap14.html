    <title>Condicionales</title>

<body>
    <h1>Bienvenido</h1>
    <input type="text" id="hora" placeholder="Ingrese la hora en formato 24hrs">
    <button onclick="regresaHora()">Enviar</button>
    <script>

        // buenos dias de 6hrs a 11hrs de la mañana
        // buenas tardes de 12hrs a 18hrs
        // buenas noches de 19hrs  a 23hrs
        // Dejame dormir de 00hrs a 5hrs
        function regresaHora(){
            let hora = document.getElementById("hora").value;
            if (hora >= 6 && hora <= 11){
                alert("Buenos días");

            }else{
                if(hora >= 12 && hora <= 18){
                    alert("Buenas tardes");

                }else{
                    if(hora >= 19 && hora <= 23){
                        alert("Buenas noches");

                    }else{
                        if(hora >= 0 && hora <= 5){
                            alert("Déjame dormir");
                        }else{
                            alert("Hora no válida");
                        }
                    }
                }
            }



        }
        console.log("Operador ternario");
        let eresMayor = (edad >= 18) ? "Eres mayor de edad" : "Eres menor de edad";
        
        let diaSemana = 1;
        switch(diaSemana){
            case 0:
                console.log("Domingo");
                break;
            case 1:
                console.log("Lunes");
                break;
            case 2:
                console.log("Martes");
                break;
            case 3:
                console.log("Miércoles");
                break;
            case 4:
                console.log("Jueves");
                break;
            case 5:
                console.log("Viernes");
                break;  
            case 6:
                console.log("Sábado");
                break;
            default:
                console.log("Día no válido");
        }
    </script>
</body>
