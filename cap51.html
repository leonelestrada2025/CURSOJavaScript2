<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbols</title>
</head>
<body>
    Nuevos tipos de datos
    <script>
        //nuevos tipos de datos que existen en javaScript
        //Symbol
        let id = Symbol("id");
        let id2 = Symbol("id2");
        console.log(id === id2)
        console.log(typeof id,typeof id2)

        const SALUDAR = Symbol("saludar");

        const NAME = Symbol();
        const NOMBRE = Symbol("nombre");

        const persona = {
            [NOMBRE]: "Leo",
            edad: 35,

        }
        console.log(persona)

        persona.NOMBRE = "Leonel Estrada"
        console.log(persona)

        console.log(persona.NOMBRE);
        console.log(persona[NOMBRE]);

        persona[SALUDAR] = function (){
            console.log("HOLA")
        }
        persona[SALUDAR]();

        for(let propiedades in persona ){
            console.log(propiedades);
            console.log(persona[propiedades])
        }

        console.log(Object.getOwnPropertySymbols(persona)); //Mostrar los simbolos
    
        

        //Symbolo crea un identificador unico de modo que cuado comparemos 1d y id2 sean totalmete diferentes

    </script>
</body>
</html>
