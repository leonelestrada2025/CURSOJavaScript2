        //Multiplicar el factorial de un numero.
        const factorial = (numero = undefined) =>{
           if(numero === undefined) return console.warn("No ingresaste un numero"); 

            if(typeof numero !== "number") return console.error(`El valor "${numero}" ingresado no es numero`);

            if(numero === 0) return console.error(`El valor ingresado no puede ser 0`);

            if(Math.sign(numero) === -1) return console.error(`El valor ingresado no puede ser negativo`);

            let factorial = 1;
            for(let i = numero; i > 1; i--){
                factorial *= i;
            }
            return console.info(`El factorial de ${numero} es ${factorial}`)
        }
        factorial();
        factorial("5");
        factorial([1,2,3]);
        factorial({});
        factorial(0);
        factorial(-5);
        factorial(5)
