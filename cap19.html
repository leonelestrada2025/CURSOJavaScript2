<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos Literales</title>
</head>
<body>
    <script>
        let nombre = 'KEnAi'
        edad = 7;
        const perro = {
            nombre:nombre,
            edad:edad,
            ladrar: function(){
                console.log("Guauuuuu Guauuuuu")
            }
        }
        console.log(perro)
        perro.ladrar()

        const dog = {
            nombre,
            edad,
            raza:"Callejero",
            ladrar(){
                console.log("Guauuuuu Guauuuuu Guauuuuu")
            }
        }
        console.log(dog)
        dog.ladrar();

    </script>
</body>
</html>
