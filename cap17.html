<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break-Continue</title>
</head>
<body>
    <script>
        const numero = [1,2,3,4,5,6,7,8,9,0];
        for (let i = 0; numero.length; i++) {
            if (i === 5){
                break;
            }
            console.log(numero[i]);


        }
        for (let i = 0; numero.length; i++) {
            if (i === 5){
                continue;
            }
            console.log(numero[i]);
        }
    </script>
    
</body>
</html>
